name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Doctor check
        run: node scripts/doctor.mjs --allow-blocked

      - name: Setup check (read-only mode)
        run: node scripts/setup.mjs --skip-install

      - name: Documentation consistency
        run: npm run docs:check

      - name: Version consistency
        run: npm run version:check
